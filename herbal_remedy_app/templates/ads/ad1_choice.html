<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AyuCure Ad</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --deep-green: #1a3a2a;
    --sage: #4a6741;
    --gold: #c4973b;
    --gold-light: #d4a84b;
    --cream: #f5efe0;
    --cream-dark: #e8dfc8;
    --bark: #3d2b1f;
    --leaf: #5a7c4f;
    --text-dark: #2a1f14;
  }

  body {
    background: #1a1a1a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 20px;
    font-family: 'Lora', Georgia, serif;
  }

  .ad-container {
    width: 1080px;
    height: 1080px;
    position: relative;
    overflow: hidden;
    background: var(--cream);
    border-radius: 4px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  /* Aged paper texture overlay */
  .ad-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 80%, rgba(196,151,59,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(90,124,79,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(61,43,31,0.03) 0%, transparent 70%);
    pointer-events: none;
    z-index: 1;
  }

  /* Grain texture */
  .ad-container::after {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0.3;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.4'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 2;
  }

  /* Border frame */
  .border-frame {
    position: absolute;
    inset: 24px;
    border: 1.5px solid var(--sage);
    opacity: 0.4;
    z-index: 3;
    pointer-events: none;
  }

  .border-frame-inner {
    position: absolute;
    inset: 32px;
    border: 0.5px solid var(--sage);
    opacity: 0.25;
    z-index: 3;
    pointer-events: none;
  }

  /* Corner botanicals */
  .corner-botanical {
    position: absolute;
    z-index: 4;
    color: var(--sage);
    opacity: 0.15;
    font-size: 140px;
    line-height: 1;
  }
  .corner-botanical.tl { top: 40px; left: 44px; transform: rotate(0deg); }
  .corner-botanical.tr { top: 40px; right: 44px; transform: rotate(90deg); }
  .corner-botanical.bl { bottom: 40px; left: 44px; transform: rotate(-90deg); }
  .corner-botanical.br { bottom: 40px; right: 44px; transform: rotate(180deg); }

  /* Leaf decorations */
  .leaf-svg {
    position: absolute;
    z-index: 4;
    opacity: 0.12;
  }

  .leaf-left {
    left: -40px;
    top: 50%;
    transform: translateY(-50%) rotate(-10deg);
    width: 300px;
    height: 500px;
  }

  .leaf-right {
    right: -40px;
    top: 50%;
    transform: translateY(-50%) rotate(10deg) scaleX(-1);
    width: 300px;
    height: 500px;
  }

  /* Main content */
  .content {
    position: relative;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 80px 100px;
    text-align: center;
  }

  /* Top decorative element */
  .top-ornament {
    margin-bottom: 20px;
    color: var(--gold);
    font-size: 28px;
    letter-spacing: 12px;
    opacity: 0.7;
  }

  .brand-mark {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 18px;
    font-weight: 400;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: var(--sage);
    margin-bottom: 48px;
    opacity: 0.7;
  }

  /* Tagline main */
  .tagline-main {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 82px;
    font-weight: 700;
    line-height: 1.05;
    color: var(--text-dark);
    margin-bottom: 16px;
    letter-spacing: -1px;
  }

  .tagline-your {
    display: block;
    font-size: 52px;
    font-weight: 400;
    font-style: italic;
    color: var(--sage);
    letter-spacing: 2px;
    margin-bottom: 4px;
  }

  .tagline-body {
    display: block;
    color: var(--bark);
  }

  .tagline-call {
    display: block;
    color: var(--gold);
    position: relative;
  }

  /* Divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 20px;
    margin: 44px 0;
    width: 60%;
  }

  .divider-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
  }

  .divider-leaf {
    color: var(--gold);
    font-size: 22px;
    opacity: 0.8;
  }

  /* Sub tagline */
  .tagline-sub {
    font-family: 'Lora', Georgia, serif;
    font-size: 26px;
    line-height: 1.6;
    color: var(--bark);
    font-weight: 400;
    max-width: 700px;
    letter-spacing: 0.3px;
  }

  .tagline-sub em {
    font-style: italic;
    color: var(--sage);
  }

  .tagline-sub strong {
    font-weight: 500;
    color: var(--text-dark);
  }

  .pharma-strike {
    color: #8b5e3c;
    opacity: 0.7;
    position: relative;
  }

  .pharma-strike::after {
    content: '';
    position: absolute;
    left: -2px;
    right: -2px;
    top: 55%;
    height: 2px;
    background: var(--gold);
    opacity: 0.6;
    transform: rotate(-1deg);
  }

  /* CTA */
  .cta-area {
    margin-top: 52px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .cta-button {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--cream);
    background: var(--deep-green);
    border: none;
    padding: 18px 56px;
    cursor: pointer;
    position: relative;
    transition: all 0.3s ease;
  }

  .cta-button::before {
    content: '';
    position: absolute;
    inset: -3px;
    border: 1px solid var(--gold);
    opacity: 0.5;
  }

  .cta-button:hover {
    background: var(--sage);
  }

  .cta-url {
    font-family: 'Lora', Georgia, serif;
    font-size: 14px;
    color: var(--sage);
    letter-spacing: 2px;
    opacity: 0.6;
  }

  /* Bottom strip */
  .bottom-strip {
    position: absolute;
    bottom: 48px;
    left: 0;
    right: 0;
    display: flex;
    justify-content: center;
    gap: 40px;
    z-index: 5;
  }

  .bottom-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Lora', Georgia, serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--sage);
    opacity: 0.5;
  }

  .bottom-dot {
    width: 4px;
    height: 4px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.6;
  }

  /* Mortar & pestle icon area */
  .icon-area {
    margin-bottom: 10px;
  }

  .icon-area svg {
    width: 56px;
    height: 56px;
    opacity: 0.2;
  }
</style>
</head>
<body>

<div class="ad-container">
  <div class="border-frame"></div>
  <div class="border-frame-inner"></div>

  <!-- Corner accents -->
  <div class="corner-botanical tl">❧</div>
  <div class="corner-botanical tr">❧</div>
  <div class="corner-botanical bl">❧</div>
  <div class="corner-botanical br">❧</div>

  <!-- Leaf SVGs -->
  <svg class="leaf-svg leaf-left" viewBox="0 0 300 500" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M250 0 C250 0 280 150 200 250 C120 350 50 350 50 500" stroke="#4a6741" stroke-width="1.5" fill="none"/>
    <path d="M250 0 C250 0 240 100 200 170 C160 240 80 280 50 500" stroke="#4a6741" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M200 170 C200 170 170 160 140 180" stroke="#4a6741" stroke-width="0.8" fill="none" opacity="0.4"/>
    <path d="M220 120 C220 120 190 110 160 130" stroke="#4a6741" stroke-width="0.8" fill="none" opacity="0.4"/>
    <path d="M180 220 C180 220 150 215 120 240" stroke="#4a6741" stroke-width="0.8" fill="none" opacity="0.4"/>
    <path d="M150 280 C150 280 120 275 90 300" stroke="#4a6741" stroke-width="0.8" fill="none" opacity="0.3"/>
    <path d="M120 340 C120 340 95 340 70 365" stroke="#4a6741" stroke-width="0.8" fill="none" opacity="0.3"/>
    <!-- Leaves -->
    <ellipse cx="160" cy="150" rx="35" ry="15" transform="rotate(-30 160 150)" fill="#4a6741" opacity="0.06"/>
    <ellipse cx="130" cy="220" rx="30" ry="12" transform="rotate(-20 130 220)" fill="#4a6741" opacity="0.05"/>
    <ellipse cx="100" cy="300" rx="28" ry="11" transform="rotate(-15 100 300)" fill="#4a6741" opacity="0.04"/>
  </svg>

  <svg class="leaf-svg leaf-right" viewBox="0 0 300 500" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M250 0 C250 0 280 150 200 250 C120 350 50 350 50 500" stroke="#4a6741" stroke-width="1.5" fill="none"/>
    <path d="M250 0 C250 0 240 100 200 170 C160 240 80 280 50 500" stroke="#4a6741" stroke-width="0.8" fill="none" opacity="0.5"/>
    <path d="M200 170 C200 170 170 160 140 180" stroke="#4a6741" stroke-width="0.8" fill="none" opacity="0.4"/>
    <path d="M220 120 C220 120 190 110 160 130" stroke="#4a6741" stroke-width="0.8" fill="none" opacity="0.4"/>
    <path d="M180 220 C180 220 150 215 120 240" stroke="#4a6741" stroke-width="0.8" fill="none" opacity="0.4"/>
    <ellipse cx="160" cy="150" rx="35" ry="15" transform="rotate(-30 160 150)" fill="#4a6741" opacity="0.06"/>
    <ellipse cx="130" cy="220" rx="30" ry="12" transform="rotate(-20 130 220)" fill="#4a6741" opacity="0.05"/>
  </svg>

  <div class="content">
    <div class="top-ornament">⟡ ⟡ ⟡</div>

    <div class="brand-mark">NatureCure</div>

    <div class="icon-area">
      <svg viewBox="0 0 56 56" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Mortar -->
        <path d="M12 28 C12 28 10 44 16 48 C20 50 36 50 40 48 C46 44 44 28 44 28" stroke="#4a6741" stroke-width="1.8" fill="none"/>
        <path d="M8 28 L48 28" stroke="#4a6741" stroke-width="1.8" stroke-linecap="round"/>
        <!-- Pestle -->
        <path d="M34 26 L42 10" stroke="#4a6741" stroke-width="2.5" stroke-linecap="round"/>
        <circle cx="43" cy="8" r="3" fill="none" stroke="#4a6741" stroke-width="1.5"/>
        <!-- Leaf in mortar -->
        <path d="M24 34 C24 34 28 30 32 34 C28 36 24 34 24 34Z" fill="#4a6741" opacity="0.3"/>
      </svg>
    </div>

    <h1 class="tagline-main">
      <span class="tagline-your">Your</span>
      <span class="tagline-body">Body.</span>
      <span class="tagline-call">Your Call.</span>
    </h1>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-leaf">☙</span>
      <span class="divider-line"></span>
    </div>

    <p class="tagline-sub">
      <em>Ancient wisdom</em> for your health —<br>
      not <span class="pharma-strike">Pharma profits</span>.
    </p>

    <div class="cta-area">
      <a href="/questionnaire" class="cta-button" style="text-decoration:none;display:inline-block;">Find Your Remedy</a>
      <span class="cta-url">naturecure.app</span>
    </div>
  </div>

  <div class="bottom-strip">
    <span class="bottom-item"><span class="bottom-dot"></span> 45+ Remedies</span>
    <span class="bottom-item"><span class="bottom-dot"></span> Personalized</span>
    <span class="bottom-item"><span class="bottom-dot"></span> No Prescription</span>
  </div>
</div>

</body>
</html>
