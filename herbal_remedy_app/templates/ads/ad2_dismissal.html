<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --deep: #1c1c2a;
    --slate: #3a3a52;
    --bruise: #6b5b7b;
    --warm: #c9a96e;
    --cream: #f0ebe0;
    --sage: #6a8c6a;
    --text-light: #e8e2d6;
    --text-dim: #9a9aaa;
  }
  body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; font-family: 'Lora', Georgia, serif; }

  .ad {
    width: 100%; max-width: 800px; aspect-ratio: 1/1; position: relative; overflow: hidden;
    background: var(--deep);
  }
  .ad::after {
    content: ''; position: absolute; inset: 0; opacity: 0.15;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 2;
  }
  .frame { position: absolute; inset: 28px; border: 1px solid rgba(201,169,110,0.15); z-index: 3; pointer-events: none; }

  .content {
    position: relative; z-index: 5; display: flex; flex-direction: column;
    align-items: center; justify-content: center; height: 100%;
    padding: 100px 110px; text-align: center;
  }

  .doctor-quote {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 52px; font-weight: 400; font-style: italic;
    color: var(--text-dim); line-height: 1.25; margin-bottom: 12px;
    opacity: 0.6;
  }
  .doctor-quote .nothing {
    position: relative; display: inline-block;
  }
  .doctor-quote .nothing::after {
    content: ''; position: absolute; left: -4px; right: -4px; top: 52%;
    height: 2px; background: var(--warm); opacity: 0.5; transform: rotate(-1deg);
  }

  .body-says {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 72px; font-weight: 700; color: var(--text-light);
    line-height: 1.1; margin-top: 20px;
  }
  .body-says .otherwise {
    color: var(--warm); display: block; font-style: italic; font-weight: 600;
  }

  .divider {
    display: flex; align-items: center; gap: 20px;
    margin: 50px 0; width: 50%;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--warm), transparent); opacity: 0.3; }
  .divider-icon { color: var(--sage); font-size: 20px; opacity: 0.5; }

  .listening {
    font-family: 'Lora', Georgia, serif; font-size: 28px;
    color: var(--sage); font-weight: 400; letter-spacing: 0.5px;
    line-height: 1.5;
  }
  .listening em { font-style: italic; color: var(--warm); }

  .cta-area { margin-top: 56px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .cta-button {
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 19px;
    font-weight: 600; letter-spacing: 4px; text-transform: uppercase;
    color: var(--deep); background: var(--warm); border: none;
    padding: 18px 52px; cursor: pointer; text-decoration: none; display: inline-block;
    transition: all 0.3s ease; position: relative;
  }
  .cta-button::before { content: ''; position: absolute; inset: -3px; border: 1px solid var(--warm); opacity: 0.3; }
  .cta-url { font-size: 13px; color: var(--text-dim); letter-spacing: 2px; opacity: 0.4; }

  .brand {
    position: absolute; bottom: 48px; left: 0; right: 0; text-align: center;
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 16px;
    letter-spacing: 8px; text-transform: uppercase; color: var(--text-dim);
    opacity: 0.3; z-index: 5;
  }

  /* Subtle stethoscope crossed out */
  .icon-area { margin-bottom: 32px; opacity: 0.12; }
</style>
</head>
<body>
<div class="ad">
  <div class="frame"></div>
  <div class="content">
    <div class="icon-area">
      <svg width="50" height="50" viewBox="0 0 50 50" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="25" cy="36" r="8" stroke="#9a9aaa" stroke-width="1.5"/>
        <path d="M17 36 C17 20 17 14 25 10 C33 14 33 20 33 36" stroke="#9a9aaa" stroke-width="1.5" fill="none"/>
        <line x1="8" y1="8" x2="42" y2="42" stroke="#c9a96e" stroke-width="1.5" opacity="0.6"/>
      </svg>
    </div>
    <p class="doctor-quote">"Your doctor said it's <span class="nothing">nothing</span>."</p>
    <h1 class="body-says">Your body says<span class="otherwise">otherwise.</span></h1>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-icon">☙</span>
      <span class="divider-line"></span>
    </div>

    <p class="listening">NatureCure — <em>we start by listening.</em></p>

    <div class="cta-area">
      <a href="/questionnaire" class="cta-button">Tell Us Your Symptoms</a>
      <span class="cta-url">naturecure.app</span>
    </div>
  </div>
  <div class="brand">NatureCure</div>
</div>
</body>
</html>
