<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --earth: #2a2218;
    --clay: #5c4033;
    --terracotta: #b8734a;
    --amber: #d4a04a;
    --linen: #f2ece0;
    --sage: #7a9a6d;
    --text-warm: #e8dcc8;
    --text-soft: #a89880;
  }
  body { background: #111; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; font-family: 'Lora', Georgia, serif; }

  .ad {
    width: 100%; max-width: 800px; aspect-ratio: 1/1; position: relative; overflow: hidden;
    background: linear-gradient(170deg, #2e2419 0%, var(--earth) 40%, #1e1810 100%);
  }
  .ad::after {
    content: ''; position: absolute; inset: 0; opacity: 0.2;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 2;
  }
  .frame { position: absolute; inset: 28px; border: 1px solid rgba(212,160,74,0.1); z-index: 3; pointer-events: none; }

  .content {
    position: relative; z-index: 5; display: flex; flex-direction: column;
    align-items: center; justify-content: center; height: 100%;
    padding: 100px 100px; text-align: center;
  }

  /* Pill bottles icon */
  .icon-area { margin-bottom: 36px; opacity: 0.15; }

  .setup {
    font-family: 'Lora', Georgia, serif; font-size: 34px;
    color: var(--text-soft); line-height: 1.5; font-weight: 400;
    max-width: 750px; margin-bottom: 8px;
  }
  .setup .six {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 44px; font-weight: 700; color: var(--terracotta);
  }
  .setup .ten-years {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 44px; font-weight: 700; color: var(--terracotta);
  }

  .not-better {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 36px; font-weight: 400; font-style: italic;
    color: var(--text-soft); opacity: 0.5; margin-top: 4px; margin-bottom: 48px;
  }

  .another-way {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 82px; font-weight: 700; color: var(--text-warm);
    line-height: 1.05; letter-spacing: -1px;
  }
  .another-way .there {
    display: block; font-size: 42px; font-weight: 400; font-style: italic;
    color: var(--amber); letter-spacing: 2px; margin-bottom: 4px;
  }

  .divider {
    display: flex; align-items: center; gap: 20px;
    margin: 44px 0; width: 40%;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--amber), transparent); opacity: 0.25; }
  .divider-icon { color: var(--sage); font-size: 18px; opacity: 0.4; }

  .sub {
    font-family: 'Lora', Georgia, serif; font-size: 22px;
    color: var(--sage); opacity: 0.7; letter-spacing: 0.5px;
  }

  .cta-area { margin-top: 52px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .cta-button {
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 19px;
    font-weight: 600; letter-spacing: 4px; text-transform: uppercase;
    color: var(--earth); background: var(--amber); border: none;
    padding: 18px 52px; cursor: pointer; text-decoration: none; display: inline-block;
    transition: all 0.3s ease; position: relative;
  }
  .cta-button::before { content: ''; position: absolute; inset: -3px; border: 1px solid var(--amber); opacity: 0.3; }
  .cta-url { font-size: 13px; color: var(--text-soft); letter-spacing: 2px; opacity: 0.35; }

  .brand {
    position: absolute; bottom: 48px; left: 0; right: 0; text-align: center;
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 16px;
    letter-spacing: 8px; text-transform: uppercase; color: var(--text-soft);
    opacity: 0.25; z-index: 5;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="frame"></div>
  <div class="content">
    <div class="icon-area">
      <svg width="80" height="50" viewBox="0 0 80 50" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Multiple pill bottles -->
        <rect x="4" y="14" width="10" height="22" rx="1" stroke="#a89880" stroke-width="1"/>
        <rect x="2" y="12" width="14" height="4" rx="1" stroke="#a89880" stroke-width="1"/>
        <rect x="18" y="10" width="10" height="26" rx="1" stroke="#a89880" stroke-width="1"/>
        <rect x="16" y="8" width="14" height="4" rx="1" stroke="#a89880" stroke-width="1"/>
        <rect x="32" y="16" width="10" height="20" rx="1" stroke="#a89880" stroke-width="1"/>
        <rect x="30" y="14" width="14" height="4" rx="1" stroke="#a89880" stroke-width="1"/>
        <rect x="46" y="12" width="10" height="24" rx="1" stroke="#a89880" stroke-width="1"/>
        <rect x="44" y="10" width="14" height="4" rx="1" stroke="#a89880" stroke-width="1"/>
        <rect x="60" y="14" width="10" height="22" rx="1" stroke="#a89880" stroke-width="1"/>
        <rect x="58" y="12" width="14" height="4" rx="1" stroke="#a89880" stroke-width="1"/>
        <rect x="68" y="18" width="10" height="18" rx="1" stroke="#a89880" stroke-width="1"/>
        <rect x="66" y="16" width="14" height="4" rx="1" stroke="#a89880" stroke-width="1"/>
      </svg>
    </div>

    <p class="setup">Mom's been on <span class="six">6 medications</span><br>for <span class="ten-years">10 years</span>.</p>
    <p class="not-better">She's not getting better.</p>

    <h1 class="another-way">
      <span class="there">There's</span>
      another way.
    </h1>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-icon">✦</span>
      <span class="divider-line"></span>
    </div>

    <p class="sub">Personalized natural remedies. No prescription needed.</p>

    <div class="cta-area">
      <a href="/questionnaire" class="cta-button">Find Her Remedy</a>
      <span class="cta-url">naturecure.app</span>
    </div>
  </div>
  <div class="brand">NatureCure</div>
</div>
</body>
</html>
