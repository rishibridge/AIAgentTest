<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --midnight: #0f1a12;
    --forest: #1a3322;
    --green: #2d5a3a;
    --gold: #c8a84e;
    --gold-bright: #dbb955;
    --cream: #f0e8d0;
    --text-light: #ddd8c8;
    --text-dim: #7a8a6a;
  }
  body { background: #0a0a0a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; font-family: 'Lora', Georgia, serif; }

  .ad {
    width: 100%; max-width: 800px; aspect-ratio: 1/1; position: relative; overflow: hidden;
    background: linear-gradient(175deg, var(--forest) 0%, var(--midnight) 50%, #0a1210 100%);
  }
  .ad::after {
    content: ''; position: absolute; inset: 0; opacity: 0.18;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 2;
  }
  .frame { position: absolute; inset: 28px; border: 1px solid rgba(200,168,78,0.1); z-index: 3; pointer-events: none; }

  /* Glow behind headline */
  .glow {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    width: 600px; height: 600px; border-radius: 50%;
    background: radial-gradient(circle, rgba(200,168,78,0.04) 0%, transparent 70%);
    z-index: 3; pointer-events: none;
  }

  .content {
    position: relative; z-index: 5; display: flex; flex-direction: column;
    align-items: center; justify-content: center; height: 100%;
    padding: 100px 90px; text-align: center;
  }

  .theyll {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 44px; font-weight: 400; font-style: italic;
    color: var(--text-dim); line-height: 1.4; max-width: 780px;
    margin-bottom: 36px;
  }
  .theyll .crazy {
    font-weight: 700; color: var(--gold); font-style: normal; font-size: 50px;
  }

  .until {
    font-family: 'Lora', Georgia, serif; font-size: 24px;
    color: var(--text-dim); font-style: italic; opacity: 0.5;
    margin-bottom: 16px; letter-spacing: 1px;
  }

  .bloodwork {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 78px; font-weight: 700; color: var(--text-light);
    line-height: 1.05; letter-spacing: -1px;
  }
  .bloodwork .clean {
    color: var(--gold-bright); display: block;
  }

  .divider {
    display: flex; align-items: center; gap: 20px;
    margin: 48px 0; width: 40%;
  }
  .divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); opacity: 0.2; }
  .divider-icon { color: var(--green); font-size: 18px; opacity: 0.5; }

  .trust {
    font-family: 'Lora', Georgia, serif; font-size: 26px;
    color: var(--green); font-weight: 500; letter-spacing: 0.5px;
    line-height: 1.5;
  }
  .trust em { font-style: italic; color: var(--gold); }

  .cta-area { margin-top: 52px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .cta-button {
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 19px;
    font-weight: 600; letter-spacing: 4px; text-transform: uppercase;
    color: var(--midnight); background: var(--gold); border: none;
    padding: 18px 52px; cursor: pointer; text-decoration: none; display: inline-block;
    transition: all 0.3s ease; position: relative;
  }
  .cta-button::before { content: ''; position: absolute; inset: -3px; border: 1px solid var(--gold); opacity: 0.3; }
  .cta-url { font-size: 13px; color: var(--text-dim); letter-spacing: 2px; opacity: 0.35; }

  .brand {
    position: absolute; bottom: 48px; left: 0; right: 0; text-align: center;
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 16px;
    letter-spacing: 8px; text-transform: uppercase; color: var(--text-dim);
    opacity: 0.25; z-index: 5;
  }
</style>
</head>
<body>
<div class="ad">
  <div class="frame"></div>
  <div class="glow"></div>
  <div class="content">
    <p class="theyll">They'll call you <span class="crazy">crazy</span><br>until your bloodwork<br>comes back clean.</p>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-icon">✦</span>
      <span class="divider-line"></span>
    </div>

    <p class="trust"><em>Trust your instincts.</em> Find your remedy.</p>

    <div class="cta-area">
      <a href="/questionnaire" class="cta-button">Find Your Remedy</a>
      <span class="cta-url">naturecure.app</span>
    </div>
  </div>
  <div class="brand">NatureCure</div>
</div>
</body>
</html>
