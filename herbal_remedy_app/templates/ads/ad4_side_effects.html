<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #f7f2e8;
    --ink: #1a1a1a;
    --red-muted: #8b3a3a;
    --red-bright: #b54444;
    --gold: #b8943e;
    --sage: #5a7c50;
    --text-mid: #4a4035;
    --text-light: #8a7d6d;
  }
  body { background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; font-family: 'Lora', Georgia, serif; }

  .ad {
    width: 100%; max-width: 800px; aspect-ratio: 1/1; position: relative; overflow: hidden;
    background: var(--bg);
  }
  .ad::after {
    content: ''; position: absolute; inset: 0; opacity: 0.25;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 2;
  }
  .frame { position: absolute; inset: 28px; border: 1px solid rgba(138,125,109,0.2); z-index: 3; pointer-events: none; }

  .content {
    position: relative; z-index: 5; display: flex; flex-direction: column;
    align-items: center; justify-content: center; height: 100%;
    padding: 100px 100px; text-align: center;
  }

  /* Broken pill icon */
  .icon-area { margin-bottom: 32px; opacity: 0.18; }

  .fixed {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 54px; font-weight: 400; color: var(--text-mid);
    line-height: 1.3;
  }
  .fixed .one { font-weight: 700; color: var(--sage); }
  .fixed .three { font-weight: 700; color: var(--red-muted); }

  .broke {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 54px; font-weight: 400; color: var(--text-mid);
    line-height: 1.3; margin-bottom: 0;
  }

  .headline-group { margin-bottom: 48px; }

  .divider {
    display: flex; align-items: center; gap: 20px;
    margin-bottom: 48px; width: 50%;
  }
  .divider-line { flex: 1; height: 1.5px; background: linear-gradient(to right, transparent, var(--red-muted), transparent); opacity: 0.25; }
  .divider-icon { color: var(--gold); font-size: 18px; opacity: 0.5; }

  .remedy-line {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 68px; font-weight: 700; color: var(--ink);
    line-height: 1.1; margin-bottom: 8px;
  }
  .remedy-line .ancient { color: var(--sage); }

  .no-roulette {
    font-family: 'Lora', Georgia, serif;
    font-size: 26px; color: var(--text-mid); font-style: italic;
    letter-spacing: 0.5px;
  }
  .no-roulette .roulette {
    color: var(--red-bright); position: relative; font-weight: 500;
  }

  .cta-area { margin-top: 56px; display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .cta-button {
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 19px;
    font-weight: 600; letter-spacing: 4px; text-transform: uppercase;
    color: var(--bg); background: var(--sage); border: none;
    padding: 18px 52px; cursor: pointer; text-decoration: none; display: inline-block;
    transition: all 0.3s ease; position: relative;
  }
  .cta-button::before { content: ''; position: absolute; inset: -3px; border: 1px solid var(--sage); opacity: 0.3; }
  .cta-url { font-size: 13px; color: var(--text-light); letter-spacing: 2px; opacity: 0.5; }

  .brand {
    position: absolute; bottom: 48px; left: 0; right: 0; text-align: center;
    font-family: 'Cormorant Garamond', Georgia, serif; font-size: 16px;
    letter-spacing: 8px; text-transform: uppercase; color: var(--text-light);
    opacity: 0.3; z-index: 5;
  }

  /* Side effect "fine print" scattered */
  .side-effects {
    position: absolute; z-index: 4; pointer-events: none;
  }
  .se-item {
    position: absolute; font-family: 'Lora', Georgia, serif;
    font-size: 11px; color: var(--red-muted); opacity: 0.12;
    letter-spacing: 1px; text-transform: lowercase;
    white-space: nowrap;
  }
  .se-item:nth-child(1) { top: 60px; left: 60px; transform: rotate(-5deg); }
  .se-item:nth-child(2) { top: 85px; right: 80px; transform: rotate(3deg); }
  .se-item:nth-child(3) { top: 120px; left: 180px; transform: rotate(-2deg); }
  .se-item:nth-child(4) { bottom: 120px; right: 120px; transform: rotate(4deg); }
  .se-item:nth-child(5) { bottom: 95px; left: 100px; transform: rotate(-3deg); }
  .se-item:nth-child(6) { top: 150px; right: 160px; transform: rotate(1deg); }
  .se-item:nth-child(7) { bottom: 150px; left: 200px; transform: rotate(-4deg); }
  .se-item:nth-child(8) { top: 100px; left: 400px; transform: rotate(2deg); }
  .se-item:nth-child(9) { bottom: 130px; right: 300px; transform: rotate(-1deg); }
</style>
</head>
<body>
<div class="ad">
  <div class="frame"></div>

  <div class="side-effects">
    <span class="se-item">nausea</span>
    <span class="se-item">dizziness</span>
    <span class="se-item">headache</span>
    <span class="se-item">insomnia</span>
    <span class="se-item">fatigue</span>
    <span class="se-item">dry mouth</span>
    <span class="se-item">weight gain</span>
    <span class="se-item">brain fog</span>
    <span class="se-item">joint pain</span>
  </div>

  <div class="content">
    <div class="icon-area">
      <svg width="60" height="60" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Broken pill -->
        <rect x="8" y="22" width="18" height="16" rx="8" stroke="#8b3a3a" stroke-width="1.5" transform="rotate(-15 17 30)"/>
        <rect x="34" y="22" width="18" height="16" rx="8" stroke="#8b3a3a" stroke-width="1.5" transform="rotate(10 43 30)"/>
        <!-- crack -->
        <path d="M26 20 L28 28 L24 32 L28 40" stroke="#8b3a3a" stroke-width="1" opacity="0.5"/>
      </svg>
    </div>

    <div class="headline-group">
      <p class="fixed">The pill fixed <span class="one">one</span> thing.</p>
      <p class="broke">Broke <span class="three">three</span> others.</p>
    </div>

    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-icon">☙</span>
      <span class="divider-line"></span>
    </div>

    <h1 class="remedy-line"><span class="ancient">Ancient</span> remedies.</h1>
    <p class="no-roulette">No <span class="roulette">side-effect roulette</span>.</p>

    <div class="cta-area">
      <a href="/questionnaire" class="cta-button">Find Your Remedy</a>
      <span class="cta-url">naturecure.app</span>
    </div>
  </div>
  <div class="brand">NatureCure</div>
</div>
</body>
</html>
